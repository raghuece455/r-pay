services:
  postgres:
    image: postgres:16-alpine
    container_name: rpay-postgres
    environment:
      POSTGRES_USER: rpay
      POSTGRES_PASSWORD: rpay
      POSTGRES_DB: rpay
    ports:
      - "5432:5432"
    volumes:
      - rpay-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpay -d rpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rpay-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - rpay-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rpay-postgres:
  rpay-redis:

